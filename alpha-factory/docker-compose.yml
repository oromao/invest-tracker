# ─────────────────────────────────────────────────────────────────────────────
#  ALPHA FACTORY — Lightweight Production Compose
#
#  CORE (default — 3 containers, ~400 MB RAM):
#    docker compose up -d
#
#  + RAG vector context:
#    docker compose --profile rag up -d
#
#  + LLM signal narratives (optional, needs ~4 GB RAM if enabled):
#    docker compose --profile ai up -d
#    (also set AI_ENABLED=true and AI_PROVIDER=ollama in .env)
#
#  + Web UI:
#    docker compose --profile ui up -d
#
#  + Observability (Prometheus + Grafana):
#    docker compose --profile monitoring up -d
#
#  Full stack:
#    docker compose --profile rag --profile ai --profile ui --profile monitoring up -d
# ─────────────────────────────────────────────────────────────────────────────

networks:
  alpha-net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  grafana_data:
  prometheus_data:

services:

  # ── CORE ─────────────────────────────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
      POSTGRES_DB: alpha_factory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alpha-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha -d alpha_factory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - alpha-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # AI is disabled by default; enable explicitly with AI_ENABLED=true
      AI_ENABLED: "${AI_ENABLED:-false}"
      AI_PROVIDER: "${AI_PROVIDER:-none}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alpha-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health | grep -q 'ok' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── RAG profile (vector similarity for signal context) ────────────────────

  qdrant:
    profiles: [rag]
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - alpha-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── AI profile (LLM signal narratives via local Ollama) ───────────────────

  ollama:
    profiles: [ai]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - alpha-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-init:
    profiles: [ai]
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - alpha-net
    entrypoint: ["/bin/sh", "-c", "OLLAMA_HOST=http://ollama:11434 ollama pull phi3:mini"]
    restart: "no"

  # ── UI profile (Next.js dashboard) ───────────────────────────────────────

  frontend:
    profiles: [ui]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3002:3001"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - alpha-net
    restart: unless-stopped

  # ── Monitoring profile (Prometheus + Grafana) ─────────────────────────────

  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - alpha-net
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    depends_on:
      - prometheus
    networks:
      - alpha-net
    restart: unless-stopped
