global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "alpha-factory"

rule_files: []

scrape_configs:
  - job_name: alpha_factory
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
